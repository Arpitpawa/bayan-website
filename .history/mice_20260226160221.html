<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bayan Celebrations & MICE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/mice.css">
</head>
<body>

<!-- ================= HERO ================= -->
<section class="mice-hero">
  <div class="mice-hero-content">
    <h1>Celebrations & Events</h1>
    <p>
      From intimate gatherings to grand celebrations,
      Bayan offers refined venues set in heritage-inspired surroundings.
    </p>
  </div>
</section>

<!-- ================= INTRO ================= -->
<section class="mice-intro">
  <h2>Our Elegant Event Spaces</h2>
</section>

<!-- ================= EVENT LIST ================= -->
<section class="event-list">

  <div class="event-item" data-event="garden">
    <span>Celebration Garden</span>
    <span>500 Guests</span>
    <button class="discover-btn">Discover More</button>
  </div>

  <div class="event-item" data-event="courtyard">
    <span>Central Courtyard</span>
    <span>150 Guests</span>
    <button class="discover-btn">Discover More</button>
  </div>

  <div class="event-item" data-event="conference">
    <span>Conference Hall</span>
    <span>70 Guests</span>
    <button class="discover-btn">Discover More</button>
  </div>

</section>

<!-- ================= MODAL ================= -->
<div class="event-modal" id="eventModal">
  <div class="event-modal-inner">
    <button class="modal-close">&times;</button>

    <div class="modal-image">
      <img id="modalImg" src="" alt="">
    </div>

    <div class="modal-content">
      <span id="modalGuests"></span>
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
      <a href="contact.html" class="enquiry-btn">Make an Enquiry</a>
    </div>
  </div>
</div>

<script src="assets/js/mice.js"></script>
</body>
</html>
