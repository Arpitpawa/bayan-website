<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact Us | Bayan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="assets/css/brand-skin.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/contact.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="nav-bar">
    <div class="nav-left">
      <button class="menu-toggle">☰</button>
    </div>
    <a href="index.html" class="logo">BAYAN</a>
    <a href="#" class="nav-cta">BOOK NOW</a>
  </div>
</header>

<div class="nav-spacer"></div>

<!-- CONTACT SECTION -->
<section class="contact-wrap">

  <!-- LEFT -->
  <div class="contact-left">
    <span class="contact-eyebrow">Bayan Hotels & Resorts</span>
    <h1>Have a question for us?</h1>
    <p class="contact-subtext">
      You know what to do. Drop us a line and we’ll get back to you as soon as possible.
    </p>

    <form class="contact-form">

      <select>
        <option>Please choose your request</option>
        <option>Reservations</option>
        <option>Experiences</option>
        <option>Weddings & Events</option>
        <option>General Enquiry</option>
      </select>

      <select>
        <option>Title</option>
        <option>Mr</option>
        <option>Ms</option>
        <option>Mrs</option>
      </select>

      <input type="text" placeholder="First name">
      <input type="text" placeholder="Last name">
      <input type="tel" placeholder="Phone">
      <input type="email" placeholder="Email">
      <textarea placeholder="Message"></textarea>

      <button type="submit" class="contact-btn">Send</button>
    </form>
  </div>

  <!-- RIGHT -->
  <div class="contact-right">
    <h4>Contact</h4>
    <p>
      Bayan Hotels & Resorts<br>
      Rajasthan, India
    </p>

    <p>
      <a href="mailto:crs@thebayanhotels.com">crs@thebayanhotels.com</a><br>
      +91 83063 00609<
      +91 83063 00610
    </p>
    

    <div class="contact-socials">
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
    </div>
  </div>

</section>

</body>
</html>
